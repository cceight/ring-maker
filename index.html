<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>文字画像生成</title>

<style>

@font-face{
  font-family:"calligraphr";
  src:url("fonts/Calligraphr-Regular.otf") format("opentype");
}

body{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#box{
  margin-bottom:20px;
}

#stage{
  position:relative;
  width:500px;
}

#bg{
  width:100%;
}

#textLayer{
  position:absolute;
  top:298px;
  left:50%;
  transform:translateX(-50%);
  font-size:60px;
  font-family:"calligraphr";
  color:black;
  text-align:center;
  white-space:nowrap;
  pointer-events:none;
}

</style>
</head>
<body>

<div id="box">

<input type="text" id="text" maxlength="8">

<button onclick="showText()">表示</button>

<button onclick="downloadWood()">wood.png出力</button>

<button onclick="downloadGold()">gold.png出力</button>

</div>

<div id="stage">
<img id="bg" src="images/wood.png">
<div id="textLayer"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.js"></script>

<script>

function showText(){

  const t = document.getElementById("text").value.trim();
  document.getElementById("textLayer").textContent = t;

}

function getTextPosition(){

  const textLayer = document.getElementById("textLayer");
  const bg = document.getElementById("bg");

  const rect = textLayer.getBoundingClientRect();
  const bgRect = bg.getBoundingClientRect();

  const x = rect.left - bgRect.left + rect.width/2;
  let y = rect.top - bgRect.top;

  return {x,y};

}

async function downloadWood(){

  const textLayer = document.getElementById("textLayer");
  const text = textLayer.textContent;

  if(!text){
    alert("文字を入力してください");
    return;
  }

  const img = new Image();
  img.src = "images/wood.png";

  await img.decode();

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  ctx.drawImage(img,0,0);

  const pos = getTextPosition();

  ctx.font = "60px calligraphr";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.fillStyle = "black";

  const metrics = ctx.measureText(text);

  let y = pos.y;

  if(metrics.actualBoundingBoxAscent){
      y += metrics.actualBoundingBoxAscent;
  }

  ctx.fillText(text,pos.x,y);

  const link = document.createElement("a");
  link.download = "wood_result.png";
  link.href = canvas.toDataURL("image/png");
  link.click();

}

async function downloadGold(){

  const textLayer = document.getElementById("textLayer");
  const text = textLayer.textContent;

  if(!text){
    alert("文字を入力してください");
    return;
  }

  const response = await fetch("images/gold.png");
  const buffer = await response.arrayBuffer();

  const apng = UPNG.decode(buffer);
  const frames = UPNG.toRGBA8(apng);

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = apng.width;
  canvas.height = apng.height;

  const pos = getTextPosition();

  const newFrames = [];

  for(let i=0;i<frames.length;i++){

    const imgData = new ImageData(
      new Uint8ClampedArray(frames[i]),
      apng.width,
      apng.height
    );

    ctx.putImageData(imgData,0,0);

    ctx.font = "60px calligraphr";
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "black";

    const metrics = ctx.measureText(text);

    let y = pos.y;

    if(metrics.actualBoundingBoxAscent){
        y += metrics.actualBoundingBoxAscent;
    }

    ctx.fillText(text,pos.x,y);

    const frame = ctx.getImageData(0,0,canvas.width,canvas.height);
    newFrames.push(frame.data.buffer);

  }

  const delays = apng.frames.map(f => f.delay);

  const encoded = UPNG.encode(
    newFrames,
    canvas.width,
    canvas.height,
    0,
    delays
  );

  const blob = new Blob([encoded],{type:"image/png"});
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "gold_result.apng";
  link.click();

}

</script>

</body>
</html>
