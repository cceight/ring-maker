<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>APNG文字生成</title>

<style>

@font-face{
  font-family:"calligraphr";
  src:url("fonts/Calligraphr-Regular.otf") format("opentype");
}

body{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#box{
  margin-bottom:20px;
}

#stage{
  position:relative;
  width:500px;
}

#bg{
  width:100%;
}

#textLayer{
  position:absolute;
  top:298px;
  left:50%;
  transform:translateX(-50%);
  font-size:60px;
  font-family:"calligraphr";
  color:black;
  text-align:center;
  white-space:nowrap;
  pointer-events:none;
}

</style>
</head>
<body>

<div id="box">
<input type="text" id="text" maxlength="8">
<button onclick="showText()">出力</button>
<button onclick="downloadImage()">ダウンロード</button>
</div>

<div id="stage">
<img id="bg" src="images/wood.png">
<div id="textLayer"></div>
</div>

<script>

const textY = 298;
const fontSize = 60;

function showText(){

  const t = document.getElementById("text").value.trim();

  if(t.length === 0){
    document.getElementById("textLayer").textContent="";
    return;
  }

  document.getElementById("textLayer").textContent = t;

}

function downloadImage(){

  const textLayer = document.getElementById("textLayer");
  const text = textLayer.textContent;

  if(!text){
    alert("文字を入力してください");
    return;
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const bg = document.getElementById("bg");

  canvas.width = bg.naturalWidth;
  canvas.height = bg.naturalHeight;

  ctx.drawImage(bg,0,0);

  const rect = textLayer.getBoundingClientRect();
  const bgRect = bg.getBoundingClientRect();

  const x = rect.left - bgRect.left + rect.width/2;
  const y = rect.top - bgRect.top;

  ctx.font = "60px calligraphr";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillStyle = "black";

  ctx.fillText(text, x, y);

  const link = document.createElement("a");
  link.download = "result.png";
  link.href = canvas.toDataURL("image/png");
  link.click();

}

</script>

</body>
</html>
