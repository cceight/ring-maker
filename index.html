<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文字入り画像ジェネレーター</title>

  <!-- ★ 重要: pako を UPNG より先に読み込む -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/upng-js@2.1.0/UPNG.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --border: #2a2a32;
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --wood: #8b5e3c;
      --wood-light: #c8895a;
      --text: #e8e4dc;
      --muted: #6b6878;
      --radius: 10px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.2rem 1.5rem;
      gap: 1rem;
    }

    h1 {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      color: var(--text);
      opacity: 0.9;
      flex-shrink: 0;
    }

    /* ── 2カラムレイアウト ── */
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.2rem;
      width: 100%;
      max-width: 860px;
      align-items: start;
    }

    /* 左パネル */
    .panel-left {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    /* 右パネル */
    .panel-right {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    /* 入力 */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .input-group > label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1.3rem;
      letter-spacing: 0.2em;
      padding: 0.5rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: var(--gold); }

    /* コントロール */
    .ctrl-title {
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      border-top: 1px solid var(--border);
      padding-top: 0.9rem;
      margin-top: -0.1rem;
    }
    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .ctrl-row label {
      width: 5em;
      flex-shrink: 0;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .ctrl-row input[type="range"] {
      flex: 1;
      accent-color: var(--gold);
      cursor: pointer;
    }
    .ctrl-row input[type="color"] {
      width: 2.2rem;
      height: 1.8rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 2px;
    }
    .ctrl-val {
      font-size: 0.75rem;
      color: var(--text);
      min-width: 3em;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ダウンロードボタン */
    .btn-row {
      display: flex;
      gap: 0.6rem;
      width: 100%;
    }
    button {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-wood { background: linear-gradient(135deg, var(--wood), var(--wood-light)); color: #fff; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: #1a1200; }

    /* ステータス */
    #status {
      font-size: 0.75rem;
      color: var(--muted);
      min-height: 1.1em;
      text-align: center;
      width: 100%;
    }
    #status.error { color: #e05555; }
    #status.ok    { color: #5cb85c; }

    /* プレビュートグル */
    .preview-toggle {
      display: flex;
      gap: 0.4rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      width: 100%;
    }
    .toggle-btn {
      flex: 1;
      min-width: auto;
      padding: 0.35rem 0.8rem;
      background: transparent;
      color: var(--muted);
      border-radius: 5px;
      font-size: 0.82rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.active {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* プレビューCanvas */
    #preview-canvas {
      border-radius: 8px;
      width: 100%;
      max-width: 480px;
      height: auto;
      border: 1px solid var(--border);
      display: block;
    }

    /* note */
    .note {
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.6;
      width: 100%;
      border-top: 1px solid var(--border);
      padding-top: 0.8rem;
    }

    /* スマホはシングルカラム */
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
      body { justify-content: flex-start; padding-top: 1.5rem; }
    }
  </style>
</head>
<body>

<h1>文字入り画像ジェネレーター</h1>

<div class="layout">

  <!-- ── 左パネル：入力 + コントロール ── -->
  <div class="panel-left">

    <div class="input-group">
      <label for="kana-input">ひらがなを入力</label>
      <input type="text" id="kana-input" placeholder="あいうえお" value="あ">
    </div>

    <p class="ctrl-title">文字スタイル調整</p>

    <div class="ctrl-row">
      <label>サイズ</label>
      <input type="range" id="ctrl-size" min="20" max="300" value="58" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-size">58px</span>
    </div>

    <div class="ctrl-row">
      <label>横位置</label>
      <input type="range" id="ctrl-x" min="0" max="100" value="50" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-x">50%</span>
    </div>

    <div class="ctrl-row">
      <label>縦位置</label>
      <input type="range" id="ctrl-y" min="0" max="100" value="65" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-y">65%</span>
    </div>

    <div class="ctrl-row">
      <label>文字色</label>
      <input type="color" id="ctrl-color" value="#000000" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-color">#000000</span>
    </div>

    <div class="ctrl-row">
      <label>影の濃さ</label>
      <input type="range" id="ctrl-shadow" min="0" max="100" value="0" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-shadow">0%</span>
    </div>

    <div class="ctrl-row">
      <label>アウトライン</label>
      <input type="range" id="ctrl-outline" min="0" max="20" value="0" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-outline">0px</span>
    </div>

    <div class="ctrl-row">
      <label>縁取り色</label>
      <input type="color" id="ctrl-outline-color" value="#000000" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-outline-color">#000000</span>
    </div>

    <div class="ctrl-row">
      <label>アーチ</label>
      <input type="range" id="ctrl-arch" min="-100" max="100" value="0" oninput="onCtrlChange()">
      <span class="ctrl-val" id="val-arch">0</span>
    </div>

  </div>

  <!-- ── 右パネル：プレビュー + ダウンロード ── -->
  <div class="panel-right">

    <div class="preview-toggle">
      <button id="toggle-wood" class="toggle-btn active" onclick="setPreviewMode('wood')">🪵 Wood</button>
      <button id="toggle-gold" class="toggle-btn"        onclick="setPreviewMode('gold')">✨ Gold</button>
    </div>

    <canvas id="preview-canvas" width="480" height="480"></canvas>

    <div class="btn-row">
      <button class="btn-wood" onclick="downloadWood()">🪵 Wood PNG</button>
      <button class="btn-gold" id="btn-gold" onclick="downloadGold()">✨ Gold APNG</button>
    </div>

    <p id="status">フォント読み込み中…</p>

    <p class="note">
      ※ フォント: <code>fonts/Calligraphr-Regular.otf</code><br>
      ※ 背景: <code>images/wood.png</code> / <code>images/gold.png</code><br>
      ※ APNG の各フレームに文字を合成してダウンロードします。
    </p>

  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  固定設定
// ─────────────────────────────────────────────
const FONT_URL  = 'fonts/Calligraphr-Regular.otf';
const FONT_NAME = 'CalligraphrRegular';
const WOOD_URL  = 'images/wood.png';
const GOLD_URL  = 'images/gold.png';
const CANVAS_W  = 480;
const CANVAS_H  = 480;

// ─────────────────────────────────────────────
//  コントロールから設定を読む
// ─────────────────────────────────────────────
function getTextStyle() {
  return {
    size:         parseInt(document.getElementById('ctrl-size').value),
    xPct:         parseInt(document.getElementById('ctrl-x').value) / 100,
    yPct:         parseInt(document.getElementById('ctrl-y').value) / 100,
    color:        document.getElementById('ctrl-color').value,
    shadowAlpha:  parseInt(document.getElementById('ctrl-shadow').value) / 100,
    outlineWidth: parseInt(document.getElementById('ctrl-outline').value),
    outlineColor: document.getElementById('ctrl-outline-color').value,
    arch:         parseInt(document.getElementById('ctrl-arch').value),
  };
}

// コントロール変更時：ラベル更新 + プレビュー再描画
function onCtrlChange() {
  document.getElementById('val-size').textContent          = document.getElementById('ctrl-size').value + 'px';
  document.getElementById('val-x').textContent             = document.getElementById('ctrl-x').value + '%';
  document.getElementById('val-y').textContent             = document.getElementById('ctrl-y').value + '%';
  document.getElementById('val-color').textContent         = document.getElementById('ctrl-color').value;
  document.getElementById('val-shadow').textContent        = document.getElementById('ctrl-shadow').value + '%';
  document.getElementById('val-outline').textContent       = document.getElementById('ctrl-outline').value + 'px';
  document.getElementById('val-outline-color').textContent = document.getElementById('ctrl-outline-color').value;
  document.getElementById('val-arch').textContent          = document.getElementById('ctrl-arch').value;
  refreshPreview();
}

// テキスト入力変更時もプレビュー更新
document.getElementById('kana-input').addEventListener('input', refreshPreview);

// ─────────────────────────────────────────────
//  フォントの事前ロード
// ─────────────────────────────────────────────
let fontReady = false;

async function loadFont() {
  if (fontReady) return;
  try {
    const font = new FontFace(FONT_NAME, `url(${FONT_URL})`);
    await font.load();
    document.fonts.add(font);
    fontReady = true;
  } catch (e) {
    console.warn('カスタムフォントの読み込みに失敗。システムフォントを使用:', e);
    fontReady = true;
  }
}

// ─────────────────────────────────────────────
//  テキスト描画（スタイル設定を受け取る）
// ─────────────────────────────────────────────
function drawText(ctx, text, style) {
  const { size, xPct, yPct, color, shadowAlpha, outlineWidth, outlineColor, arch } = style;
  const cx = CANVAS_W * xPct;
  const cy = CANVAS_H * yPct;
  const fontFamily = fontReady ? `"${FONT_NAME}", serif` : 'serif';

  ctx.font         = `${size}px ${fontFamily}`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  const setShadow = () => {
    if (shadowAlpha > 0) {
      ctx.shadowColor   = `rgba(0,0,0,${shadowAlpha})`;
      ctx.shadowBlur    = Math.max(4, size * 0.08);
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 2;
    }
  };
  const clearShadow = () => {
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
  };

  // ── アーチなし：通常描画 ──
  if (arch === 0) {
    setShadow();
    if (outlineWidth > 0) {
      ctx.lineWidth = outlineWidth * 2; ctx.lineJoin = 'round';
      ctx.strokeStyle = outlineColor;
      ctx.strokeText(text, cx, cy);
    }
    ctx.fillStyle = color;
    ctx.fillText(text, cx, cy);
    clearShadow();
    return;
  }

  // ── アーチあり：sagitta（弦の高さ）ベースで配置 ──
  //
  // 【設計】
  //   s = sagitta = arch値をpxに換算した「弦の中央の膨らみ量」
  //   文字列を直線に並べたときの「弦の長さ」を L とすると
  //   円の半径 R = (L²/4 + s²) / (2s)  ← sagittaの公式
  //
  //   弧の中点（= 文字列中央）が常に (cx, cy) になるよう配置する
  //   arch > 0 → 上アーチ: 中点より弦が下 → 円の中心は cy の下方
  //   arch < 0 → 下アーチ: 中点より弦が上 → 円の中心は cy の上方

  const chars = [...text];
  const widths = chars.map(c => ctx.measureText(c).width);
  const L = widths.reduce((a, b) => a + b, 0); // 弦の長さ

  // arch(±1〜±100) → sagitta(px)
  // arch=±100 でキャンバス高さの約30%分の膨らみ
  const maxSag = CANVAS_H * 0.30;
  const s = (Math.abs(arch) / 100) * maxSag; // 常に正

  // 半径を sagitta の公式で算出（L=0対策：最小弦長をsizeに）
  const Leff = Math.max(L, size * 0.5);
  const R = (Leff * Leff / 4 + s * s) / (2 * s);

  // arch符号：上アーチ(+) → 円の中心は cy より下、下アーチ(-) → cy より上
  const sign = arch > 0 ? 1 : -1;
  const centerX = cx;
  const centerY = cy + sign * R;  // 円の中心

  // 弧の頂点角度：常に -π/2（円の真上）を使う
  // 上アーチ: 中心が cy の下 → 真上 = cy の方向 ✓
  // 下アーチ: 中心が cy の上 → 真下 = cy の方向だが、
  //           あえて -π/2 を使い、文字の向きを保ったまま弧を反転させる
  const apexAngle  = -Math.PI / 2;
  const totalAngle = L / R;
  // 下アーチは左右を反転させる（文字順を保ちつつ弧を下向きに）
  const startAngle = apexAngle + (sign > 0 ? -1 : 1) * totalAngle / 2;
  const angleStep  = sign; // +1: 左→右、-1: 右→左（反転打消し用）

  // 各文字の弧長オフセット（文字中心）
  let cumW = 0;
  const arcOffsets = chars.map((_, i) => {
    const offset = cumW + widths[i] / 2;
    cumW += widths[i];
    return offset;
  });

  // 1文字描画ヘルパー
  const drawChar = (c, arcLen, doStroke) => {
    const angle = startAngle + angleStep * arcLen / R;
    ctx.save();
    ctx.translate(
      centerX + R * Math.cos(angle),
      centerY + R * Math.sin(angle)
    );
    // 上アーチ: angle + π/2 で文字が上向き
    // 下アーチ: sign=-1 なので angle - π/2 → 文字が下向きにならず正立を保つ
    ctx.rotate(angle + sign * Math.PI / 2);
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    if (doStroke) {
      ctx.lineWidth   = outlineWidth * 2;
      ctx.lineJoin    = 'round';
      ctx.strokeStyle = outlineColor;
      ctx.strokeText(c, 0, 0);
    } else {
      setShadow();
      ctx.fillStyle = color;
      ctx.fillText(c, 0, 0);
      clearShadow();
    }
    ctx.restore();
  };

  if (outlineWidth > 0) {
    arcOffsets.forEach((a, i) => drawChar(chars[i], a, true));
  }
  arcOffsets.forEach((a, i) => drawChar(chars[i], a, false));
}

// ─────────────────────────────────────────────
//  Canvas に背景画像 + 文字を描画
// ─────────────────────────────────────────────
function drawTextOnCanvas(canvas, imgSrc, text, style) {
  return new Promise((resolve, reject) => {
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.drawImage(img, 0, 0, CANVAS_W, CANVAS_H);
      drawText(ctx, text, style);
      resolve();
    };
    img.onerror = () => reject(new Error('画像の描画に失敗しました'));
    img.src = imgSrc;
  });
}

// ─────────────────────────────────────────────
//  リアルタイムプレビュー（Wood / Gold 切り替え対応）
// ─────────────────────────────────────────────
let previewMode = 'wood';

function setPreviewMode(mode) {
  previewMode = mode;
  document.getElementById('toggle-wood').classList.toggle('active', mode === 'wood');
  document.getElementById('toggle-gold').classList.toggle('active', mode === 'gold');
  refreshPreview();
}

let previewPending = false;
async function refreshPreview() {
  if (previewPending) return;
  previewPending = true;
  await new Promise(r => setTimeout(r, 16));
  previewPending = false;

  const text   = document.getElementById('kana-input').value || '　';
  const canvas = document.getElementById('preview-canvas');
  const style  = getTextStyle();
  const url    = previewMode === 'gold' ? GOLD_URL : WOOD_URL;
  try {
    await drawTextOnCanvas(canvas, url, text, style);
  } catch (e) {
    // プレビュー失敗は無視
  }
}

// ─────────────────────────────────────────────
//  ステータス表示
// ─────────────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className   = type;
}

// ─────────────────────────────────────────────
//  ユーティリティ: URL → ArrayBuffer
// ─────────────────────────────────────────────
async function fetchBuffer(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`画像の取得に失敗: ${url} (${res.status})`);
  return res.arrayBuffer();
}

// ─────────────────────────────────────────────
//  Wood PNG ダウンロード
// ─────────────────────────────────────────────
async function downloadWood() {
  const text  = document.getElementById('kana-input').value || '　';
  const style = getTextStyle();
  try {
    setStatus('Wood PNG 生成中…');
    await loadFont();
    const canvas = document.createElement('canvas');
    canvas.width  = CANVAS_W;
    canvas.height = CANVAS_H;
    await drawTextOnCanvas(canvas, WOOD_URL, text, style);
    canvas.toBlob(blob => {
      triggerDownload(URL.createObjectURL(blob), 'wood_text.png');
      setStatus('Wood PNG ダウンロード完了！', 'ok');
    }, 'image/png');
  } catch (e) {
    setStatus('エラー: ' + e.message, 'error');
    console.error(e);
  }
}

// ─────────────────────────────────────────────
//  Gold APNG ダウンロード
// ─────────────────────────────────────────────
async function downloadGold() {
  if (typeof UPNG === 'undefined') { setStatus('エラー: UPNG.js が読み込まれていません', 'error'); return; }
  if (typeof pako === 'undefined') { setStatus('エラー: pako が読み込まれていません', 'error'); return; }

  const text  = document.getElementById('kana-input').value || '　';
  const style = getTextStyle();
  const btn   = document.getElementById('btn-gold');
  btn.disabled = true;

  try {
    setStatus('Gold APNG を読み込み中…');
    await loadFont();

    const buf    = await fetchBuffer(GOLD_URL);
    const png    = UPNG.decode(buf);
    const frames = UPNG.toRGBA8(png);
    const width  = png.width;
    const height = png.height;
    const delays = png.frames.map(f => f.delay ?? 100);

    const canvas = document.createElement('canvas');
    canvas.width  = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d');
    const newFrames = [];

    for (let i = 0; i < frames.length; i++) {
      ctx.putImageData(new ImageData(new Uint8ClampedArray(frames[i]), width, height), 0, 0);
      drawText(ctx, text, style);
      newFrames.push(ctx.getImageData(0, 0, width, height).data.buffer);
      if (i % 10 === 0) {
        setStatus(`フレーム合成中… ${i + 1} / ${frames.length}`);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    setStatus('APNG エンコード中…');
    const encoded = UPNG.encode(newFrames, width, height, 0, delays);
    const blob    = new Blob([encoded], { type: 'image/png' });
    triggerDownload(URL.createObjectURL(blob), 'gold_text.png');
    setStatus('Gold APNG ダウンロード完了！', 'ok');
  } catch (e) {
    setStatus('エラー: ' + e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────
//  ダウンロードトリガー
// ─────────────────────────────────────────────
function triggerDownload(url, filename) {
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ─────────────────────────────────────────────
//  初期化
// ─────────────────────────────────────────────
(async () => {
  onCtrlChange();
  await loadFont();
  setStatus('準備完了', 'ok');
  refreshPreview();
})();
</script>
</body>
</html>
