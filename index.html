<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>文字配置テスト</title>

<style>

@font-face{
  font-family:"calligraphr";
  src:url("fonts/Calligraphr-Regular.otf") format("opentype");
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

#box{
  margin-bottom:20px;
}

#stage{
  position:relative;
  width:500px;
}

#bg{
  width:100%;
}


#textLayer{
  position:absolute;
  top:300px;
  left:50%;
  transform:translateX(-50%);
  font-size:60px;
  font-family:"calligraphr";
  color:black;
  text-align:center;
  white-space:nowrap;
}
  
</style>
</head>
<body>

<div id="box">
<input type="text" id="text">
<button onclick="showText()">出力</button>
</div>

<div id="stage">
  <img id="bg" src="images/wood.png">
  <div id="textLayer"></div>
</div>

<script>

function showText(){
  const t = document.getElementById("text").value;
  document.getElementById("textLayer").textContent = t;
}

</script>

</body>
</html>
